server:
  port: 8080

spring:
  application:
    name: xingang-community
  datasource:
    url: jdbc:mysql://localhost:3306/xingang_community?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

ai:
  rag:
    enabled: true
    store-file: classpath:knowledge/zyro-support.json
    similarity-threshold: 0.65
  knowledge:
    top-k: 5
  embedding:
    provider: dashscope
  rerank:
    enabled: true
  rate-limit:
    chat-limit: 60
    stream-limit: 30
    window-seconds: 60
  audit:
    stream-key: hmdp:agent:audit

map:
  baidu:
    api-key: ${BAIDU_MAP_API_KEY:}

llm:
  openai-compatible:
    base-url: ${OPENAI_BASE_URL:}
    api-key: ${OPENAI_API_KEY:}
    chat-model: ${OPENAI_CHAT_MODEL:}

logging:
  level:
    com.xingang.community: debug

